__include__: [
  '../dataset/NUDT-SIRST.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deim.yml'
]

output_dir: ./deim_outputs/deim_n_NUDT-SIRST

model: DEIM
criterion: DEIMCriterion
postprocessor: PostProcessor

DEIM:
  backbone: HGNetv2
  encoder: HybridEncoder
  decoder: DFINETransformer

HGNetv2:
  name: 'B0'
  return_idx: [2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

HybridEncoder:
  in_channels: [512, 1024]
  feat_strides: [16, 32]
  csp_type: csp2
  hidden_dim: 128
  use_encoder_idx: [1]
  dim_feedforward: 512
  expansion: 0.34
  depth_mult: 0.5

DFINETransformer:
  feat_channels: [128, 128]
  feat_strides: [16, 32]
  hidden_dim: 128
  dim_feedforward: 512
  num_levels: 2
  num_layers: 3
  eval_idx: -1
  num_points: [6, 6]

optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.001
    - params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.001
      weight_decay: 0.0
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.0
  lr: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epoches: 72
warmup_iter: 50
flat_epoch: 36
no_aug_epoch: 20
lr_gamma: 0.5

eval_spatial_size: [512, 512]

train_dataloader:
  total_batch_size: 24
  num_workers: 12
  dataset:
    transforms:
      ops:
        - {type: Mosaic, output_size: 160, rotation_range: 10, 
           translation_range: [0.1, 0.1], scaling_range: [0.8, 1.2],
           probability: 1.0, fill_value: 0, use_cache: True, 
           max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.3}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.15}
        - {type: SanitizeBoundingBoxes, min_size: 2}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [512, 512]}
        - {type: SanitizeBoundingBoxes, min_size: 2}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 40, 60]
      mosaic_prob: 0.3
  collate_fn:
    type: BatchImageCollateFunction
    mixup_prob: 0.0
    mixup_epochs: [40000, 15000]
    copyblend_prob: 0.0
    copyblend_epochs: [40000, 15000]
    stop_epoch: 52
    ema_restart_decay: 0.9999
    base_size: 512
    base_size_repeat: ~

val_dataloader:
  total_batch_size: 256
  num_workers: 12
  shuffle: False
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [512, 512]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}

DEIMCriterion:
  weight_dict: {loss_vfl: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['vfl', 'boxes', 'local']
  alpha: 0.75
  gamma: 2.0
  reg_max: 32
  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
